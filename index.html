<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b9a" />
    <title>Colorwalk H5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Almendra+Display&family=Anton&family=Astloch:wght@700&family=Bebas+Neue&family=Berkshire+Swash&family=Bungee+Inline&family=Bungee+Shade&family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@500;600&family=Ewert&family=Fredericka+the+Great&family=Great+Vibes&family=Grenze+Gotisch:wght@600&family=IM+Fell+English+SC&family=Libre+Baskerville:wght@400;700&family=Libre+Bodoni:wght@400;700&family=Limelight&family=Lobster&family=MedievalSharp&family=Metamorphous&family=Monoton&family=Mystery+Quest&family=Pacifico&family=Parisienne&family=Playfair+Display:wght@600;700&family=Rubik+Dirt&family=Rye&family=Sacramento&family=Special+Elite&family=Ultra&family=UnifrakturCook:wght@700&family=Yesteryear&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app-shell" class="app-shell" data-has-asset="false">
      <section class="entry-panel" aria-label="上传图片">
        <label class="upload-zone">
          <input id="file-input" type="file" accept="image/*" />
          <span class="upload-icon">+</span>
          <span id="upload-label">上传图片</span>
        </label>
      </section>

      <section class="workspace" aria-label="Colorwalk 编辑区">
        <figure id="result-panel" class="result-panel" hidden>
          <div class="result-frame">
            <img id="result-image" alt="生成的 Colorwalk 静态图片" />
            <div id="render-loading" class="render-loading" aria-live="polite" hidden>
              <span class="loading-spinner" aria-hidden="true"></span>
              <span>更新中</span>
            </div>
          </div>
          <figcaption>高清图片实时更新，长按保存</figcaption>
        </figure>

        <div class="field color-field">
          <span>主色</span>
          <div class="color-readout" aria-label="当前主色">
            <span id="color-preview" class="color-preview" aria-hidden="true"></span>
            <strong id="color-hex">#FF6B9A</strong>
          </div>
        </div>

        <div id="swatches" class="swatches" aria-label="候选主色"></div>

        <div class="field">
          <span>字体</span>
          <div id="font-picker" class="font-picker" aria-label="字体"></div>
        </div>

        <div class="field">
          <span>字体大小</span>
          <div id="font-size-control" class="font-size-control" aria-label="字体大小">
            <button id="font-size-decrease" type="button" aria-label="减小字体">-</button>
            <label class="font-size-value-wrap">
              <input id="font-size-value" type="number" min="24" step="4" inputmode="numeric" aria-label="字体大小数值" />
              <span>px</span>
            </label>
            <button id="font-size-increase" type="button" aria-label="增大字体">+</button>
          </div>
        </div>

        <div class="field">
          <span>色板位置</span>
          <div id="palette-position" class="segment-control" aria-label="色板位置"></div>
        </div>

        <label class="field">
          内容文本
          <textarea id="content-text" maxlength="120" rows="4"></textarea>
        </label>

        <label class="reupload-link" for="file-input">重新上传</label>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
